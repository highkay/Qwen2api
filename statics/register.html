<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwen2api - 扩容中心</title>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/statics/css/app.css" rel="stylesheet">
  <style>
    .log-box{height:320px;overflow-y:auto;padding:12px 16px;border-radius:12px;background:#fafafa;font-family:var(--font-mono);font-size:11px;color:#333;line-height:1.8}
    .log-box::-webkit-scrollbar{width:4px}
    .log-box::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:999px}
    .control-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
    .control-field label{display:block;font-size:11px;color:var(--fg-muted);margin-bottom:6px}
    .control-field input,.control-field select{width:100%;height:36px;padding:0 12px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;text-align:center}
  </style>
</head>
<body>
  <header class="admin-header" id="admin-header"></header>
  <main class="admin-main">
    <div class="page-hd">
      <div>
        <div class="page-title">扩容中心</div>
        <div class="page-sub">批量注册新账号，扩充账户池</div>
      </div>
    </div>

    <!-- System Info -->
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)" id="sys-stats"></div>

    <!-- Control Panel -->
    <div class="config-card" style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:600;margin-bottom:16px">注册控制</div>
      <div class="control-grid">
        <div class="control-field">
          <label>注册数量</label>
          <input type="number" id="reg-count" value="10" min="1" max="100">
        </div>
        <div class="control-field">
          <label>并发线程</label>
          <input type="number" id="reg-threads" value="4" min="1" max="20">
        </div>
        <div class="control-field">
          <label>邮箱渠道</label>
          <select id="reg-provider">
            <option value="default">自动选择</option>
            <option value="moemail">MoeMail</option>
            <option value="tempmail">TempMail</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" id="btn-start" onclick="startRegister()">开始注册</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopRegister()" style="display:none">停止</button>
      </div>
    </div>

    <!-- Logs -->
    <div class="config-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">实时日志</div>
      <div class="log-box" id="log-box">等待日志...</div>
    </div>
  </main>

  <script src="/statics/js/common.js"></script>
  <script>
    let logInterval = null;

    async function init() {
      if (!await checkAuth()) return;
      renderHeader('register');
      await fetchSysInfo();
      startLogPolling();
    }

    async function fetchSysInfo() {
      try {
        const r = await fetch('/api/admin/system-info', { headers: authHeaders() });
        const d = await r.json();
        document.getElementById('sys-stats').innerHTML = `
          <div class="stat-cell"><div class="stat-top"><span class="stat-label">CPU 核心</span></div><div class="stat-num">${d.cpu_cores}</div></div>
          <div class="stat-cell"><div class="stat-top"><span class="stat-label">可用内存</span></div><div class="stat-num">${d.ram_available_gb} GB</div></div>
          <div class="stat-cell"><div class="stat-top"><span class="stat-label">推荐并发</span></div><div class="stat-num" style="color:var(--info)">${d.recommended_threads}</div></div>
        `;
        document.getElementById('reg-threads').value = d.recommended_threads;
      } catch {}
    }

    function startLogPolling() {
      fetchLogs();
      logInterval = setInterval(fetchLogs, 3000);
    }

    async function fetchLogs() {
      try {
        const r = await fetch('/api/admin/logs', { headers: authHeaders() });
        const d = await r.json();
        const box = document.getElementById('log-box');
        const logs = d.logs || [];
        if (logs.length > 0) {
          box.innerHTML = logs.map(l => `<div>${l}</div>`).join('');
          box.scrollTop = box.scrollHeight;
        }
      } catch {}
    }

    async function startRegister() {
      const count = +document.getElementById('reg-count').value;
      const threads = +document.getElementById('reg-threads').value;
      const provider = document.getElementById('reg-provider').value;

      const r = await fetch('/api/admin/accounts/batch-register', {
        method: 'POST', headers: jsonHeaders(),
        body: JSON.stringify({ count, threads, provider })
      });
      const d = await r.json();
      if (d.ok) {
        showToast(d.message);
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = '';
      } else {
        showToast('启动失败');
      }
    }

    async function stopRegister() {
      await fetch('/api/admin/accounts/stop-register', { method:'POST', headers:authHeaders() });
      showToast('停止信号已发送');
      document.getElementById('btn-start').style.display = '';
      document.getElementById('btn-stop').style.display = 'none';
    }

    init();
  </script>
</body>
</html>
